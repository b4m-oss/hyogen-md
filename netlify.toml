# Docs site on Netlify — production branch: main
# Spec: dev-docs/docs-site.md (docs.5+)
# Playground aliases ../app/src — install app deps first

[build]
  command = "npm --prefix app ci && npm --prefix docs-site ci && npm --prefix docs-site run generate"
  publish = "docs-site/.output/public"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
